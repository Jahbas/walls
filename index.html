<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>highpapers</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #131313;
    --text: #ededed;
    --mute: #5c5c5c;
    --border: #1f1f1f;
    --active: #2a2a2a;
    --pill: #1c1c1c;
    --shadow: rgba(0,0,0,0.6);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    max-width: 1440px;
    margin: 0 auto;
    padding: 48px 32px 96px;
  }

  header {
    margin-bottom: 32px;
  }

  h1 {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .search {
    flex: 1;
    min-width: 200px;
    max-width: 320px;
    height: 34px;
    padding: 0 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s ease;
  }

  .search::placeholder { color: var(--mute); }
  .search:focus { border-color: #333; }

  .pills {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 8px 4px 10px;
    background: var(--pill);
    border: 1px solid var(--border);
    border-radius: 5px;
    font-size: 11px;
    color: var(--text);
    cursor: default;
    animation: pillIn 0.15s ease;
  }

  .pill button {
    background: none;
    border: none;
    color: var(--mute);
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    padding: 0;
    display: flex;
  }

  .pill button:hover { color: var(--text); }

  @keyframes pillIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .filter-btn {
    width: 34px;
    height: 34px;
    border-radius: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, border-color 0.15s ease;
    position: relative;
    flex-shrink: 0;
  }

  .filter-btn svg {
    width: 15px;
    height: 15px;
    stroke: var(--text);
    fill: none;
    stroke-width: 1.5;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--active);
    border-color: #333;
  }

  .filter-btn .dot {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #fff;
    display: none;
  }

  .filter-btn.has-filters .dot { display: block; }

  .filter-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 32px;
    display: none;
    animation: panelIn 0.15s ease;
  }

  .filter-panel.open { display: block; }

  @keyframes panelIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .filter-section {
    margin-bottom: 18px;
  }

  .filter-section:last-child { margin-bottom: 0; }

  .filter-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--mute);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }

  .filter-options {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .filter-option {
    padding: 5px 12px;
    border-radius: 5px;
    background: var(--pill);
    border: 1px solid var(--border);
    color: var(--mute);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .filter-option:hover {
    color: var(--text);
    border-color: #333;
  }

  .filter-option.selected {
    background: var(--active);
    border-color: #444;
    color: var(--text);
  }

  .filter-toggle {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 5px 12px;
    border-radius: 5px;
    background: var(--pill);
    border: 1px solid var(--border);
    color: var(--mute);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .filter-toggle.on {
    background: var(--active);
    border-color: #444;
    color: var(--text);
  }

  .filter-toggle .toggle-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.15s ease;
  }

  .filter-toggle.on .toggle-dot { background: #fff; }

  .anime-list {
    margin-top: 8px;
    display: none;
    flex-wrap: wrap;
    gap: 6px;
  }

  .anime-list.show { display: flex; }

  .count-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 24px;
  }

  .count {
    font-size: 13px;
    color: var(--mute);
    font-variant-numeric: tabular-nums;
  }

  .count .filtered {
    color: var(--text);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .card {
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    background: var(--surface);
    cursor: pointer;
    opacity: 0;
    transform: translateY(12px);
    animation: enter 0.5s ease forwards;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px var(--shadow);
  }

  .card img {
    display: block;
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    transition: transform 0.4s ease;
  }

  .card:hover img { transform: scale(1.03); }

  .card .meta {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 24px 16px 12px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .card:hover .meta { opacity: 1; }

  .card .name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
  }

  .card .res {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    font-variant-numeric: tabular-nums;
  }

  .card .download {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .card .download svg {
    width: 14px;
    height: 14px;
    stroke: var(--text);
    fill: none;
    stroke-width: 1.5;
  }

  .card .download:hover { background: rgba(255,255,255,0.2); }

  @keyframes enter {
    to { opacity: 1; transform: translateY(0); }
  }

  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }

  .lightbox.open { opacity: 1; pointer-events: auto; }

  .lightbox img {
    max-width: 92vw;
    max-height: 90vh;
    border-radius: 4px;
    box-shadow: 0 4px 80px rgba(0,0,0,0.5);
    transform: scale(0.95);
    transition: transform 0.3s ease;
  }

  .lightbox.open img { transform: scale(1); }

  .lightbox .close {
    position: absolute;
    top: 24px;
    right: 24px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
  }

  .lightbox .close svg {
    width: 16px;
    height: 16px;
    stroke: var(--text);
    fill: none;
    stroke-width: 1.5;
  }

  .lightbox .close:hover { background: rgba(255,255,255,0.15); }

  .lightbox .dl {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    padding: 8px 18px 8px 14px;
    border-radius: 6px;
    background: rgba(255,255,255,0.08);
    border: none;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s ease;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .lightbox .dl svg {
    width: 14px;
    height: 14px;
    stroke: var(--text);
    fill: none;
    stroke-width: 1.5;
  }

  .lightbox .dl:hover { background: rgba(255,255,255,0.15); }

  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 80px 0;
    color: var(--mute);
    font-size: 14px;
  }

  .empty svg {
    width: 40px;
    height: 40px;
    stroke: var(--mute);
    fill: none;
    stroke-width: 1.2;
    opacity: 0.5;
  }

  @media (max-width: 768px) {
    body { padding: 32px 16px 64px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .search { max-width: none; }
    .pills { order: 3; }
  }

  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; opacity: 1; transform: none; }
    .lightbox img { transition: none; }
  }
</style>
</head>
<body>
<header><h1>highpapers</h1></header>

<div class="toolbar">
  <input type="text" class="search" id="search" placeholder="search...">
  <div class="pills" id="pills"></div>
  <button class="filter-btn" id="filterBtn" aria-label="Filters">
    <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="6" y1="18" x2="18" y2="18"/><circle cx="16" cy="6" r="1.5"/><circle cx="8" cy="12" r="1.5"/><circle cx="14" cy="18" r="1.5"/></svg>
    <span class="dot"></span>
  </button>
</div>

<div class="filter-panel" id="filterPanel">
  <div class="filter-section">
    <div class="filter-label">Resolution</div>
    <div class="filter-options" id="resFilters">
      <button class="filter-option" data-val="4k">4K</button>
      <button class="filter-option" data-val="1080p">1080p</button>
      <button class="filter-option" data-val="custom">other</button>
    </div>
  </div>
  <div class="filter-section">
    <div class="filter-label">Screen</div>
    <div class="filter-options" id="screenFilters">
      <button class="filter-option" data-val="3840x2160">3840x2160</button>
      <button class="filter-option" data-val="1080x1920">1080x1920</button>
      <button class="filter-option" data-val="custom">other</button>
    </div>
  </div>
  <div class="filter-section">
    <div class="filter-label">Anime</div>
    <button class="filter-toggle" id="animeToggle">
      <span class="toggle-dot"></span>
      anime
    </button>
    <div class="anime-list" id="animeList"></div>
  </div>
</div>

<div class="count-bar">
  <span class="count" id="count"></span>
</div>

<div class="grid" id="grid"></div>

<div class="empty" id="empty">
  <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
  <span>no wallpapers match</span>
</div>

<div class="lightbox" id="lightbox">
  <button class="close" aria-label="Close">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <img src="" alt="">
  <a class="dl" download href="">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    download
  </a>
</div>

<script>
const state = {
  search: '',
  res: [],
  screen: [],
  animeEnabled: false,
  animes: [],
  allAnimes: []
};

function resCat(w, h) {
  if (w >= 3840 && h >= 2160) return '4k';
  if (w >= 1920 && h >= 1080) return '1080p';
  return 'custom';
}

function screenCat(w, h) {
  const key = `${w}x${h}`;
  if (key === '3840x2160' || key === '1080x1920') return key;
  return 'custom';
}

function pill(label, group, val) {
  const p = document.createElement('span');
  p.className = 'pill';
  p.innerHTML = `${label} <button aria-label="Remove ${label}">&times;</button>`;
  p.querySelector('button').addEventListener('click', () => {
    if (group === 'res') state.res = state.res.filter(v => v !== val);
    if (group === 'screen') state.screen = state.screen.filter(v => v !== val);
    if (group === 'anime') {
      state.animes = state.animes.filter(v => v !== val);
      if (state.animes.length === 0) state.animeEnabled = false;
    }
    update();
  });
  return p;
}

function updatePills() {
  const container = document.getElementById('pills');
  container.innerHTML = '';
  state.res.forEach(v => {
    const label = v === '4k' ? '4K' : v === '1080p' ? '1080p' : 'other res';
    container.appendChild(pill(label, 'res', v));
  });
  state.screen.forEach(v => {
    const label = v === 'custom' ? 'other screen' : v;
    container.appendChild(pill(label, 'screen', v));
  });
  state.animes.forEach(v => {
    container.appendChild(pill(v, 'anime', v));
  });
  const fb = document.getElementById('filterBtn');
  const has = state.res.length > 0 || state.screen.length > 0 || state.animes.length > 0;
  fb.classList.toggle('has-filters', has);
  if (state.animes.length > 0) fb.classList.add('active');

  document.getElementById('animeToggle').classList.toggle('on', state.animes.length > 0);
}

function matches(wp) {
  const [w, h] = wp.resolution.split('x').map(Number);
  if (state.search) {
    const q = state.search.toLowerCase();
    if (!wp.name.toLowerCase().includes(q) && !(wp.anime || '').toLowerCase().includes(q)) return false;
  }
  if (state.res.length > 0 && !state.res.includes(resCat(w, h))) return false;
  if (state.screen.length > 0 && !state.screen.includes(screenCat(w, h))) return false;
  if (state.animes.length > 0 && !state.animes.includes(wp.anime)) return false;
  return true;
}

async function init() {
  const res = await fetch('wallpapers.json');
  const all = await res.json();

  state.allAnimes = [...new Set(all.map(w => w.anime).filter(Boolean))].sort();

  const animeList = document.getElementById('animeList');
  state.allAnimes.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'filter-option';
    btn.textContent = a;
    btn.addEventListener('click', () => {
      if (state.animes.includes(a)) {
        state.animes = state.animes.filter(v => v !== a);
      } else {
        state.animes.push(a);
      }
      update();
    });
    animeList.appendChild(btn);
  });

  document.getElementById('animeToggle').addEventListener('click', () => {
    if (state.animes.length > 0) {
      state.animes = [];
    } else {
      state.animes = [...state.allAnimes];
    }
    update();
  });

  document.getElementById('resFilters').addEventListener('click', e => {
    if (!e.target.classList.contains('filter-option')) return;
    const v = e.target.dataset.val;
    if (state.res.includes(v)) state.res = state.res.filter(x => x !== v);
    else state.res.push(v);
    update();
  });

  document.getElementById('screenFilters').addEventListener('click', e => {
    if (!e.target.classList.contains('filter-option')) return;
    const v = e.target.dataset.val;
    if (state.screen.includes(v)) state.screen = state.screen.filter(x => x !== v);
    else state.screen.push(v);
    update();
  });

  const filterBtn = document.getElementById('filterBtn');
  const filterPanel = document.getElementById('filterPanel');
  filterBtn.addEventListener('click', () => {
    filterPanel.classList.toggle('open');
  });

  const search = document.getElementById('search');
  let searchTimer;
  search.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      state.search = search.value;
      update();
    }, 150);
  });

  function updateAnimeOptions() {
    document.querySelectorAll('#animeList .filter-option').forEach(btn => {
      btn.classList.toggle('selected', state.animes.includes(btn.textContent));
    });
    const list = document.getElementById('animeList');
    list.classList.toggle('show', state.animes.length > 0 || state.allAnimes.length > 0);
    // always show when panel open
    if (filterPanel.classList.contains('open')) list.classList.add('show');
  }

  function updateResOptions() {
    document.querySelectorAll('#resFilters .filter-option').forEach(btn => {
      btn.classList.toggle('selected', state.res.includes(btn.dataset.val));
    });
  }

  function updateScreenOptions() {
    document.querySelectorAll('#screenFilters .filter-option').forEach(btn => {
      btn.classList.toggle('selected', state.screen.includes(btn.dataset.val));
    });
  }

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const countEl = document.getElementById('count');
  const lb = document.getElementById('lightbox');
  const lbImg = lb.querySelector('img');
  const lbDl = lb.querySelector('.dl');

  const downloadSvg = '<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';

  function render() {
    const filtered = all.filter(matches);
    grid.innerHTML = '';
    empty.style.display = filtered.length === 0 ? 'flex' : 'none';

    const total = all.length;
    const shown = filtered.length;
    if (total === shown) {
      countEl.innerHTML = `${total} wallpaper${total === 1 ? '' : 's'}`;
    } else {
      countEl.innerHTML = `<span class="filtered">${shown}</span> / ${total} wallpapers`;
    }

    filtered.forEach((wp, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${i * 0.04}s`;

      const img = document.createElement('img');
      img.src = wp.url;
      img.alt = wp.name || '';
      img.loading = 'lazy';

      const meta = document.createElement('div');
      meta.className = 'meta';

      const info = document.createElement('div');
      info.innerHTML = `<div class="name">${wp.name || 'untitled'}</div>${wp.resolution ? `<div class="res">${wp.resolution}</div>` : ''}`;

      const dl = document.createElement('button');
      dl.className = 'download';
      dl.innerHTML = downloadSvg;
      dl.title = 'Download';
      dl.addEventListener('click', e => {
        e.stopPropagation();
        const a = document.createElement('a');
        a.href = wp.url;
        a.download = wp.name || '';
        a.click();
      });

      meta.appendChild(info);
      meta.appendChild(dl);
      card.appendChild(img);
      card.appendChild(meta);

      card.addEventListener('click', () => {
        lbImg.src = wp.url;
        lbImg.alt = wp.name || '';
        lbDl.href = wp.url;
        lbDl.download = wp.name || '';
        lb.classList.add('open');
      });

      grid.appendChild(card);
    });
  }

  function update() {
    updatePills();
    updateResOptions();
    updateScreenOptions();
    updateAnimeOptions();
    render();
  }

  update();

  lb.querySelector('.close').addEventListener('click', () => lb.classList.remove('open'));
  lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.classList.remove('open'); });
}

init();
</script>
</body>
</html>
