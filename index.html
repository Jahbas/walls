<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>highpapers</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #131313;
    --text: #ededed;
    --mute: #5c5c5c;
    --border: #1f1f1f;
    --active: #2a2a2a;
    --pill: #1c1c1c;
    --shadow: rgba(0,0,0,0.6);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    max-width: 1440px;
    margin: 0 auto;
    padding:
      max(48px, env(safe-area-inset-top, 0px))
      max(32px, env(safe-area-inset-right, 0px))
      max(96px, env(safe-area-inset-bottom, 0px))
      max(32px, env(safe-area-inset-left, 0px));
  }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  h1 {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .section-nav {
    display: flex;
    gap: 2px;
    margin-bottom: 20px;
    background: var(--surface);
    border-radius: 7px;
    padding: 3px;
    width: fit-content;
    border: 1px solid var(--border);
  }

  .section-btn {
    padding: 6px 16px;
    border-radius: 5px;
    background: none;
    border: none;
    color: var(--mute);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .section-btn:hover { color: var(--text); }

  .section-btn.active {
    background: var(--active);
    color: var(--text);
  }

  .search-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .search-wrap {
    flex: 1;
    position: relative;
    min-width: 0;
  }

  .search {
    width: 100%;
    height: 38px;
    padding: 0 34px 0 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s ease;
  }

  .search::placeholder { color: var(--mute); }
  .search:focus { border-color: #333; }

  .search-clear {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s ease;
  }

  .search-clear svg {
    width: 12px;
    height: 12px;
    stroke: var(--mute);
    fill: none;
    stroke-width: 2;
  }

  .search-clear:hover { background: var(--active); }
  .search-clear:hover svg { stroke: var(--text); }

  .pills-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .pills {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 8px 4px 10px;
    background: var(--pill);
    border: 1px solid var(--border);
    border-radius: 5px;
    font-size: 11px;
    color: var(--text);
    cursor: default;
    animation: pillIn 0.15s ease;
  }

  .pill button {
    background: none;
    border: none;
    color: var(--mute);
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 16px;
    height: 16px;
    border-radius: 3px;
    transition: color 0.12s ease, background 0.12s ease;
  }

  .pill button:hover { color: var(--text); }

  @keyframes pillIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .icon-btn {
    width: 38px;
    height: 38px;
    border-radius: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, border-color 0.15s ease;
    position: relative;
    flex-shrink: 0;
  }

  .icon-btn svg {
    width: 16px;
    height: 16px;
    stroke: var(--text);
    fill: none;
    stroke-width: 1.5;
  }

  .icon-btn:hover { background: var(--active); border-color: #333; }

  .icon-btn.active {
    background: var(--active);
    border-color: #444;
  }

  .icon-btn.active svg { stroke: #fff; }

  .icon-btn .dot {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #fff;
    display: none;
  }

  .icon-btn.has-dot .dot { display: block; }

  .filter-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
    display: none;
    animation: panelIn 0.15s ease;
  }

  .filter-panel.open { display: block; }

  @keyframes panelIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
  }

  .filter-group {
    min-width: 140px;
  }

  .filter-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--mute);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  .filter-options {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .filter-option {
    padding: 8px 14px;
    min-height: 44px;
    display: inline-flex;
    align-items: center;
    border-radius: 4px;
    background: var(--pill);
    border: 1px solid var(--border);
    color: var(--mute);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.12s ease;
  }

  .filter-option:hover { color: var(--text); border-color: #333; }

  .filter-option.selected {
    background: var(--active);
    border-color: #444;
    color: var(--text);
  }

  .filter-toggle {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 14px;
    min-height: 44px;
    border-radius: 4px;
    background: var(--pill);
    border: 1px solid var(--border);
    color: var(--mute);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.12s ease;
  }

  .filter-toggle.on { background: var(--active); border-color: #444; color: var(--text); }

  .filter-toggle .toggle-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.12s ease;
  }

  .filter-toggle.on .toggle-dot { background: #fff; }

  .anime-list {
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .count-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }

  .count {
    font-size: 13px;
    color: var(--mute);
    font-variant-numeric: tabular-nums;
  }

  .count .filtered { color: var(--text); }

  .folder-nav {
    display: none;
    align-items: center;
    gap: 4px;
    margin-left: 10px;
  }

  .folder-nav.show { display: flex; }

  .folder-nav button {
    width: 24px;
    height: 24px;
    border-radius: 4px;
    background: var(--pill);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s ease;
  }

  .folder-nav button svg {
    width: 12px;
    height: 12px;
    stroke: var(--mute);
    fill: none;
    stroke-width: 2;
  }

  .folder-nav button:hover { background: var(--active); }
  .folder-nav button:hover svg { stroke: var(--text); }

  .folder-nav .nav-label {
    font-size: 11px;
    color: var(--mute);
    margin: 0 4px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .card, .folder-card {
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    background: var(--surface);
    cursor: pointer;
    opacity: 0;
    transform: translateY(12px);
    animation: enter 0.5s ease forwards;
    transition: transform 0.25s ease;
    will-change: transform;
  }

  .card::after, .folder-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 6px;
    box-shadow: 0 12px 40px var(--shadow);
    opacity: 0;
    transition: opacity 0.25s ease;
    pointer-events: none;
  }

  .card:hover, .folder-card:hover {
    transform: translateY(-3px);
  }

  .card:hover::after, .folder-card:hover::after { opacity: 1; }

  .card img, .folder-card img {
    display: block;
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    transition: transform 0.4s ease;
  }

  .card:hover img, .folder-card:hover img { transform: scale(1.03); }

  .card .meta {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 24px 16px 12px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .card:hover .meta { opacity: 1; }

  .card .name, .folder-card .folder-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
  }

  .card .res, .folder-card .folder-count {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    font-variant-numeric: tabular-nums;
  }

  .folder-card .folder-meta {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 24px 16px 16px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .card .download {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .card .download svg {
    width: 16px;
    height: 16px;
    stroke: var(--text);
    fill: none;
    stroke-width: 1.5;
  }

  .card .download:hover { background: rgba(255,255,255,0.2); }

  .set-card {
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    background: var(--surface);
    cursor: pointer;
    opacity: 0;
    transform: translateY(12px);
    animation: enter 0.5s ease forwards;
    transition: transform 0.25s ease;
    will-change: transform;
  }

  .set-card:hover { transform: translateY(-3px); }

  .set-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 6px;
    box-shadow: 0 12px 40px var(--shadow);
    opacity: 0;
    transition: opacity 0.25s ease;
    pointer-events: none;
  }

  .set-card:hover::after { opacity: 1; }

  .set-card .set-banner {
    display: block;
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    transition: transform 0.4s ease;
  }

  .set-card:hover .set-banner { transform: scale(1.03); }

  .set-card .set-profile {
    position: absolute;
    bottom: 8px;
    left: 12px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.2);
    background: var(--surface);
    transition: transform 0.25s ease;
    z-index: 2;
  }

  .set-card:hover .set-profile { transform: scale(1.1); }

  .set-card .set-meta {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 28px 16px 12px 84px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .set-card .set-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
  }

  .set-card .set-res {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    font-variant-numeric: tabular-nums;
  }

  .card .size-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 3px 7px;
    border-radius: 4px;
    background: rgba(0,0,0,0.55);
    font-size: 10px;
    color: rgba(255,255,255,0.7);
    font-variant-numeric: tabular-nums;
    pointer-events: none;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  @keyframes enter {
    to { opacity: 1; transform: translateY(0); }
  }

  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }

  .lightbox.open { opacity: 1; pointer-events: auto; }

  .lightbox .top-actions {
    position: absolute;
    top: max(24px, env(safe-area-inset-top, 0px));
    right: max(24px, env(safe-area-inset-right, 0px));
    display: flex;
    gap: 8px;
  }

  .lightbox .top-actions button, .lightbox .top-actions a {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
    text-decoration: none;
  }

  .lightbox .top-actions button:hover, .lightbox .top-actions a:hover {
    background: rgba(255,255,255,0.15);
  }

  .lightbox .top-actions svg {
    width: 18px;
    height: 18px;
    stroke: var(--text);
    fill: none;
    stroke-width: 1.5;
  }

  .lightbox .nav-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
    z-index: 1;
  }

  .lightbox .nav-arrow:hover { background: rgba(255,255,255,0.12); }

  .lightbox .nav-arrow svg {
    width: 20px;
    height: 20px;
    stroke: var(--text);
    fill: none;
    stroke-width: 1.5;
  }

  .lightbox .nav-prev { left: 16px; }
  .lightbox .nav-next { right: 16px; }

  .lightbox .lb-spinner {
    position: absolute;
    width: 32px;
    height: 32px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: rgba(255,255,255,0.5);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .lightbox.loading-img .lb-spinner { display: block; }

  .lightbox.loading-img img { opacity: 0; }

  .lightbox img {
    max-width: 92vw;
    max-height: 90vh;
    border-radius: 4px;
    box-shadow: 0 4px 80px rgba(0,0,0,0.5);
    transform: scale(0.95);
    transition: transform 0.3s ease, opacity 0.15s ease;
  }

  .lightbox.open img { transform: scale(1); opacity: 1; }

  body.lb-open { overflow: hidden; }

  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 80px 0;
    color: var(--mute);
    font-size: 14px;
  }

  .empty svg {
    width: 40px;
    height: 40px;
    stroke: var(--mute);
    fill: none;
    stroke-width: 1.2;
    opacity: 0.5;
  }

  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 80px 0;
    color: var(--mute);
    font-size: 14px;
  }

  .loading-spinner {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--mute);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @media (max-width: 768px) {
    body { padding: 32px 16px 64px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .filter-row { flex-direction: column; gap: 16px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .card, .folder-card { animation: none; opacity: 1; transform: none; }
    .lightbox img { transition: none; }
  }

  .info-dot {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .info-dot .dot-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s ease;
    flex-shrink: 0;
  }

  .info-dot .dot-btn svg {
    width: 15px;
    height: 15px;
    stroke: var(--mute);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
  }

  .info-dot .dot-btn:hover { border-color: #333; }
  .info-dot .dot-btn:hover svg { stroke: var(--text); }

  .info-dot.open .dot-btn { border-color: #444; }
  .info-dot.open .dot-btn svg { stroke: var(--text); }

  .info-dot .info-text {
    font-size: 11px;
    color: var(--mute);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    overflow: hidden;
    max-width: 0;
    opacity: 0;
    transition: max-width 0.3s ease, opacity 0.2s ease;
  }

  .info-dot.open .info-text {
    max-width: 200px;
    opacity: 1;
  }
</style>
</head>
<body>

<header>
  <h1>highpapers</h1>
</header>

<div class="section-nav" id="sectionNav">
  <button class="section-btn active" data-section="Wallpapers">Wallpapers</button>
  <button class="section-btn" data-section="Profiles">Profiles</button>
  <button class="section-btn" data-section="Banners">Banners</button>
  <button class="section-btn" data-section="Sets">Sets</button>
</div>

<div class="search-row">
  <div class="search-wrap">
    <input type="text" class="search" id="search" placeholder="search...">
    <button class="search-clear" id="searchClear" aria-label="Clear search" style="display:none">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <button class="icon-btn" id="folderBtn" aria-label="Folder view">
    <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
  </button>
  <button class="icon-btn" id="filterBtn" aria-label="Filters">
    <svg viewBox="0 0 24 24"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>
    <span class="dot"></span>
  </button>
</div>

<div class="pills-row" id="pills"></div>

<div class="filter-panel" id="filterPanel">
  <div class="filter-row">
    <div class="filter-group">
      <div class="filter-label">Resolution</div>
      <div class="filter-options" id="resFilters">
        <button class="filter-option" data-val="4k">4K</button>
        <button class="filter-option" data-val="1080p">1080p</button>
        <button class="filter-option" data-val="custom">other</button>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-label">Screen</div>
      <div class="filter-options" id="screenFilters">
        <button class="filter-option" data-val="3840x2160">3840x2160</button>
        <button class="filter-option" data-val="1920x1080">1920x1080</button>
        <button class="filter-option" data-val="custom">other</button>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-label" id="animeFilterLabel">Anime</div>
      <button class="filter-toggle" id="animeToggle">
      <span class="toggle-dot"></span>
      <span id="animeToggleLabel">all anime</span>
    </button>
      <div class="anime-list" id="animeList"></div>
    </div>
  </div>
</div>

<div class="count-bar">
  <span class="count" id="count"></span>
  <div class="folder-nav" id="folderNav">
    <button id="folderBack" aria-label="Back to folders">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button id="folderDownload" aria-label="Download folder">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
  </div>
</div>

<div class="info-dot" id="infoDot">
  <button class="dot-btn" id="infoDotBtn" aria-label="Info">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 17v-6"/><circle cx="12" cy="7.5" r="1.5" fill="currentColor" stroke="none"/></svg>
  </button>
  <div class="info-text" id="infoText"></div>
</div>

<div class="grid" id="grid"></div>

<div class="loading" id="loading">
  <div class="loading-spinner"></div>
  <span>loading</span>
</div>

<div class="empty" id="empty">
  <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
  <span id="emptyMsg">no wallpapers match</span>
</div>

<div class="lightbox" id="lightbox">
  <div class="top-actions">
    <button class="lb-dl" aria-label="Download">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
    <button class="lb-close" aria-label="Close">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <button class="nav-arrow nav-prev" aria-label="Previous" style="display:none">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="nav-arrow nav-next" aria-label="Next" style="display:none">
    <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <div class="lb-spinner"></div>
  <img src="" alt="">
</div>

<script>
const state = {
  search: '',
  res: [],
  screen: [],
  animes: [],
  allAnimes: [],
  folderMode: false,
  activeFolder: null,
  section: 'Wallpapers',
};

let allWallpapers = [];

function resCat(w, h) {
  if (w >= 3840 && h >= 2160) return '4k';
  if (w >= 1920 && h >= 1080) return '1080p';
  return 'custom';
}

function screenCat(w, h) {
  const key = `${w}x${h}`;
  if (key === '3840x2160' || key === '1920x1080') return key;
  return 'custom';
}

function pill(label, group, val) {
  const p = document.createElement('span');
  p.className = 'pill';

  const text = document.createTextNode(label);
  p.appendChild(text);

  const btn = document.createElement('button');
  btn.setAttribute('aria-label', `Remove ${label}`);
  btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  btn.addEventListener('click', e => {
    e.stopPropagation();
    if (group === 'res') state.res = state.res.filter(v => v !== val);
    if (group === 'screen') state.screen = state.screen.filter(v => v !== val);
    if (group === 'anime') {
      state.animes = state.animes.filter(v => v !== val);
    }
    update();
  });
  p.appendChild(btn);

  return p;
}

function updatePills() {
  const container = document.getElementById('pills');
  container.innerHTML = '';
  state.res.forEach(v => {
    const label = v === '4k' ? '4K' : v === '1080p' ? '1080p' : 'other res';
    container.appendChild(pill(label, 'res', v));
  });
  state.screen.forEach(v => {
    const label = v === 'custom' ? 'other screen' : v;
    container.appendChild(pill(label, 'screen', v));
  });
  state.animes.forEach(v => {
    container.appendChild(pill(v, 'anime', v));
  });
  const fb = document.getElementById('filterBtn');
  const has = state.res.length > 0 || state.screen.length > 0 || state.animes.length > 0;
  fb.classList.toggle('has-dot', has);
  if (state.animes.length > 0) fb.classList.add('active');

  document.getElementById('animeToggle').classList.toggle('on', state.animes.length > 0);
  document.getElementById('folderBtn').classList.toggle('active', state.folderMode);
  document.getElementById('folderBtn').setAttribute('aria-label', `${sectionLabel(true)} view`);
  document.getElementById('animeToggleLabel').textContent = `all ${sectionLabel(true)}`;
  document.getElementById('animeFilterLabel').textContent = state.section === 'Sets' ? 'Sets' : 'Anime';
}

function contradictoryFilters() {
  if (state.res.length > 1) return true;
  if (state.screen.length > 1) return true;
  if (state.res.includes('4k') && state.screen.includes('1920x1080')) return true;
  if (state.res.includes('1080p') && state.screen.includes('3840x2160')) return true;
  return false;
}

function sectionLabel(plural) {
  switch (state.section) {
    case 'Profiles': return plural ? 'profiles' : 'profile';
    case 'Banners': return plural ? 'banners' : 'banner';
    case 'Sets': return plural ? 'sets' : 'set';
    default: return plural ? 'wallpapers' : 'wallpaper';
  }
}

function matches(wp) {
  if (state.section === 'Sets') {
    if (!wp.set) return false;
  } else {
    const wpSection = wp.section || 'Wallpapers';
    if (wpSection !== state.section) return false;
  }
  const [w, h] = wp.resolution.split('x').map(Number);
  if (state.search) {
    const q = state.search.toLowerCase();
    if (!wp.name.toLowerCase().includes(q) && !(wp.anime || '').toLowerCase().includes(q) && !wp.resolution.toLowerCase().includes(q)) return false;
  }
  if (state.res.length > 0 && !state.res.includes(resCat(w, h))) return false;
  if (state.screen.length > 0 && !state.screen.includes(screenCat(w, h))) return false;
  if (state.animes.length > 0 && !state.animes.includes(wp.anime)) return false;
  return true;
}

function triggerDownload(url, filename) {
  const a = document.createElement('a');
  a.href = url;
  a.download = filename || '';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

async function init() {
  const loading = document.getElementById('loading');
  const emptyMsg = document.getElementById('emptyMsg');

  try {
    const res = await fetch('wallpapers.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allWallpapers = await res.json();
  } catch (err) {
    loading.style.display = 'none';
    const empty = document.getElementById('empty');
    empty.style.display = 'flex';
    emptyMsg.textContent = 'failed to load wallpapers';
    return;
  }

  loading.style.display = 'none';

  document.getElementById('infoDotBtn').addEventListener('click', () => {
    document.getElementById('infoDot').classList.toggle('open');
  });

  state.allAnimes = [...new Set(allWallpapers.map(w => w.anime).filter(Boolean))].sort();

  function rebuildAnimeList() {
    const animeList = document.getElementById('animeList');
    let pool;
    if (state.section === 'Sets') {
      pool = allWallpapers.filter(w => w.set);
    } else {
      pool = allWallpapers.filter(w => (w.section || 'Wallpapers') === state.section);
    }
    const sectionKeys = [...new Set(pool.map(groupKey).filter(Boolean))].sort();
    animeList.innerHTML = '';
    sectionKeys.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'filter-option';
      btn.textContent = k;
      btn.addEventListener('click', () => {
        if (state.animes.includes(k)) {
          state.animes = state.animes.filter(v => v !== k);
        } else {
          state.animes.push(k);
        }
        update();
      });
      animeList.appendChild(btn);
    });
  }

  document.getElementById('animeToggle').addEventListener('click', () => {
    if (state.animes.length > 0) {
      state.animes = [];
    } else {
      let pool;
      if (state.section === 'Sets') {
        pool = allWallpapers.filter(w => w.set);
      } else {
        pool = allWallpapers.filter(w => (w.section || 'Wallpapers') === state.section);
      }
      state.animes = [...new Set(pool.map(groupKey).filter(Boolean))];
    }
    update();
  });

  document.getElementById('resFilters').addEventListener('click', e => {
    if (!e.target.classList.contains('filter-option')) return;
    const v = e.target.dataset.val;
    if (state.res.includes(v)) state.res = state.res.filter(x => x !== v);
    else state.res.push(v);
    update();
  });

  document.getElementById('screenFilters').addEventListener('click', e => {
    if (!e.target.classList.contains('filter-option')) return;
    const v = e.target.dataset.val;
    if (state.screen.includes(v)) state.screen = state.screen.filter(x => x !== v);
    else state.screen.push(v);
    update();
  });

  const filterBtn = document.getElementById('filterBtn');
  const filterPanel = document.getElementById('filterPanel');
  filterBtn.addEventListener('click', e => {
    e.stopPropagation();
    filterPanel.classList.toggle('open');
  });

  document.addEventListener('click', e => {
    if (!filterPanel.contains(e.target) && e.target !== filterBtn) {
      filterPanel.classList.remove('open');
    }
  });

  document.getElementById('folderBtn').addEventListener('click', () => {
    state.folderMode = !state.folderMode;
    state.activeFolder = null;
    localStorage.setItem('walls:folderMode', state.folderMode);
    update();
  });

  document.getElementById('sectionNav').addEventListener('click', e => {
    if (!e.target.classList.contains('section-btn')) return;
    state.section = e.target.dataset.section;
    state.animes = [];
    localStorage.setItem('walls:section', state.section);
    update();
  });

  const search = document.getElementById('search');
  const searchClear = document.getElementById('searchClear');
  let searchTimer;
  search.addEventListener('input', () => {
    searchClear.style.display = search.value ? 'flex' : 'none';
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      state.search = search.value;
      update();
    }, 150);
  });
  searchClear.addEventListener('click', () => {
    search.value = '';
    searchClear.style.display = 'none';
    state.search = '';
    update();
  });

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const countEl = document.getElementById('count');
  const folderNav = document.getElementById('folderNav');
  const folderBackBtn = document.getElementById('folderBack');
  const folderDownloadBtn = document.getElementById('folderDownload');
  const lb = document.getElementById('lightbox');
  const lbImg = lb.querySelector('img');
  const lbDl = lb.querySelector('.lb-dl');
  const lbClose = lb.querySelector('.lb-close');
  const lbPrev = lb.querySelector('.nav-prev');
  const lbNext = lb.querySelector('.nav-next');
  let lbImages = [];
  let lbIndex = 0;

  function openLightbox(wp, images, index) {
    lbImages = images;
    lbIndex = index;
    lb.classList.add('loading-img');
    lb.classList.add('open');
    document.body.classList.add('lb-open');
    lbImg.src = wp.url;
    lbImg.alt = wp.name || '';
    lbDl.onclick = () => { triggerDownload(wp.url, wp.name || ''); };
    lbPrev.style.display = lbImages.length > 1 ? 'flex' : 'none';
    lbNext.style.display = lbImages.length > 1 ? 'flex' : 'none';
    lbClose.focus();
  }

  function closeLightbox() {
    lb.classList.remove('open');
    document.body.classList.remove('lb-open');
    lbImg.src = '';
  }

  function lbNavigate(dir) {
    lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length;
    const wp = lbImages[lbIndex];
    lb.classList.add('loading-img');
    lbImg.src = wp.url;
    lbImg.alt = wp.name || '';
    lbDl.onclick = () => { triggerDownload(wp.url, wp.name || ''); };
  }

  lbImg.addEventListener('load', () => lb.classList.remove('loading-img'));
  lbImg.addEventListener('error', () => lb.classList.remove('loading-img'));

  lbPrev.addEventListener('click', () => lbNavigate(-1));
  lbNext.addEventListener('click', () => lbNavigate(1));

  lbClose.addEventListener('click', closeLightbox);
  lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (lb.classList.contains('open')) closeLightbox();
      else if (filterPanel.classList.contains('open')) filterPanel.classList.remove('open');
    }
    if (lb.classList.contains('open')) {
      if (e.key === 'ArrowLeft') lbNavigate(-1);
      if (e.key === 'ArrowRight') lbNavigate(1);
    }
  });

  folderBackBtn.addEventListener('click', () => {
    state.activeFolder = null;
    update();
  });

  folderDownloadBtn.addEventListener('click', () => {
    let pool;
    if (state.section === 'Sets') {
      pool = allWallpapers.filter(w => w.set && w.set === state.activeFolder);
    } else {
      pool = allWallpapers.filter(w => (w.section || 'Wallpapers') === state.section && w.anime === state.activeFolder);
    }
    if (pool.length === 0) return;

    pool.forEach((wp, i) => {
      const iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = wp.url;
      document.body.appendChild(iframe);
      setTimeout(() => document.body.removeChild(iframe), (i + 1) * 5000);
    });
  });

  const folderSvg = '<svg viewBox="0 0 24 24" style="position:absolute;top:12px;left:12px;width:20px;height:20px;stroke:rgba(255,255,255,0.6);fill:none;stroke-width:1.5;z-index:1"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
  const downloadSvg = '<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';

  function formatSize(bytes) {
    if (!bytes) return '';
    if (bytes < 1024) return `${bytes} B`;
    if (bytes < 1048576) return `${(bytes / 1024).toFixed(0)} KB`;
    return `${(bytes / 1048576).toFixed(1)} MB`;
  }

  function groupKey(wp) {
    if (state.section === 'Sets') return wp.set || null;
    return wp.anime || null;
  }

  function pairKey(wp) {
    const parts = wp.url.split('/');
    const filename = parts[parts.length - 1];
    const m = filename.match(/-(banner|profile)-(\d+)/);
    if (m) return filename.replace(/-(banner|profile)-(\d+)/, '-$2');
    return filename;
  }

  function render() {
    grid.innerHTML = '';
    empty.style.display = 'none';

    let pool;
    if (state.section === 'Sets') {
      pool = allWallpapers.filter(w => w.set);
    } else {
      pool = allWallpapers.filter(w => (w.section || 'Wallpapers') === state.section);
    }

    if (state.folderMode && !state.activeFolder) {
      folderNav.classList.remove('show');
      state.animes = [];
      updateAnimeOptions();
      updatePills();

      const keys = [...new Set(pool.map(groupKey).filter(Boolean))].sort();

      const groups = keys.map(k => ({
        key: k,
        preview: pool.find(w => groupKey(w) === k) || null,
        count: pool.filter(w => groupKey(w) === k).length,
      }));

      if (state.search) {
        const q = state.search.toLowerCase();
        const filtered = groups.filter(g => g.key.toLowerCase().includes(q));
        renderedGroups(filtered);
        countEl.innerHTML = `${filtered.length} ${sectionLabel(true)}`;
      } else {
        renderedGroups(groups);
        countEl.innerHTML = `${groups.length} ${sectionLabel(true)}`;
      }
      return;
    }

    if (state.folderMode && state.activeFolder) {
      pool = pool.filter(w => groupKey(w) === state.activeFolder);
      folderNav.classList.add('show');
    } else if (!state.folderMode) {
      folderNav.classList.remove('show');
    }

    const filtered = pool.filter(matches);

    const sectionBytes = pool.reduce((s, w) => s + (w.fileSize || 0), 0);
    document.getElementById('infoText').textContent = `${pool.length} ${sectionLabel(false)}s · ${formatSize(sectionBytes)}`;

    if (filtered.length === 0) {
      empty.style.display = 'flex';
      emptyMsg.textContent = contradictoryFilters()
        ? 'no wallpapers match — try removing conflicting filters'
        : 'no wallpapers match';
    }

    const total = pool.length;
    const shown = filtered.length;
    if (total === shown) {
      countEl.innerHTML = `${total} ${sectionLabel(false)}${total === 1 ? '' : 's'}`;
    } else {
      countEl.innerHTML = `<span class="filtered">${shown}</span> / ${total} ${sectionLabel(true)}`;
    }

    if (state.section === 'Sets' && state.activeFolder) {
      const groups = new Map();
      filtered.forEach(wp => {
        const key = pairKey(wp);
        if (!groups.has(key)) groups.set(key, { profile: null, banner: null });
        const g = groups.get(key);
        if ((wp.section || '') === 'Profiles') g.profile = wp;
        else if ((wp.section || '') === 'Banners') g.banner = wp;
        else g.banner = wp;
      });
      let pi = 0;
      groups.forEach((g, key) => {
        const card = document.createElement('div');
        card.className = 'set-card';
        card.style.animationDelay = `${pi * 0.04}s`;
        pi++;

        const banner = g.banner || g.profile;
        if (banner) {
          const bImg = document.createElement('img');
          bImg.className = 'set-banner';
          bImg.src = banner.url;
          bImg.alt = banner.name || '';
          bImg.loading = 'lazy';
          card.appendChild(bImg);
        }

        if (g.profile && g.banner) {
          const pImg = document.createElement('img');
          pImg.className = 'set-profile';
          pImg.src = g.profile.url;
          pImg.alt = g.profile.name || '';
          pImg.loading = 'lazy';
          card.appendChild(pImg);
        }

        const meta = document.createElement('div');
        meta.className = 'set-meta';
        const nameDiv = document.createElement('div');
        nameDiv.className = 'set-name';
        const baseName = (g.banner || g.profile).name.replace(/\s*\((banner|profile)\s*\d*\)/, '').trim();
        nameDiv.textContent = baseName;
        meta.appendChild(nameDiv);
        if (g.banner) {
          const resDiv = document.createElement('div');
          resDiv.className = 'set-res';
          resDiv.textContent = g.banner.resolution;
          meta.appendChild(resDiv);
        }

        const dl = document.createElement('button');
        dl.className = 'download';
        dl.innerHTML = downloadSvg;
        dl.title = 'Download profile';
        dl.addEventListener('click', e => {
          e.stopPropagation();
          if (g.profile) triggerDownload(g.profile.url, g.profile.name || '');
          else if (g.banner) triggerDownload(g.banner.url, g.banner.name || '');
        });
        meta.appendChild(dl);
        card.appendChild(meta);

        card.addEventListener('click', () => {
          openLightbox(g.profile || g.banner, [g.profile, g.banner].filter(Boolean), 0);
        });

        grid.appendChild(card);
      });
      return;
    }

    filtered.forEach((wp, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${i * 0.03}s`;

      const img = document.createElement('img');
      img.src = wp.url;
      img.alt = wp.name || '';
      img.loading = 'lazy';

      const meta = document.createElement('div');
      meta.className = 'meta';

      const info = document.createElement('div');
      const nameDiv = document.createElement('div');
      nameDiv.className = 'name';
      nameDiv.textContent = wp.name || 'untitled';
      info.appendChild(nameDiv);
      if (wp.resolution) {
        const resDiv = document.createElement('div');
        resDiv.className = 'res';
        resDiv.textContent = wp.resolution;
        info.appendChild(resDiv);
      }

      const dl = document.createElement('button');
      dl.className = 'download';
      dl.innerHTML = downloadSvg;
      dl.title = 'Download';
      dl.addEventListener('click', e => {
        e.stopPropagation();
        triggerDownload(wp.url, wp.name || '');
      });

      meta.appendChild(info);
      meta.appendChild(dl);
      card.appendChild(img);

      if (wp.fileSize) {
        const szBadge = document.createElement('div');
        szBadge.className = 'size-badge';
        szBadge.textContent = formatSize(wp.fileSize);
        card.appendChild(szBadge);
      }

      card.appendChild(meta);

      card.addEventListener('click', () => {
        openLightbox(wp, filtered, i);
      });

      grid.appendChild(card);
    });
  }

  function renderedGroups(groups) {
    groups.forEach((g, i) => {
      const card = document.createElement('div');
      card.className = 'folder-card';
      card.style.animationDelay = `${i * 0.04}s`;

      card.innerHTML = folderSvg;

      if (g.preview) {
        const img = document.createElement('img');
        img.src = g.preview.url;
        img.alt = g.key;
        img.loading = 'lazy';
        card.appendChild(img);
      }

      const meta = document.createElement('div');
      meta.className = 'folder-meta';
      const fnDiv = document.createElement('div');
      fnDiv.className = 'folder-name';
      fnDiv.textContent = g.key;
      const fcDiv = document.createElement('div');
      fcDiv.className = 'folder-count';
      fcDiv.textContent = `${g.count} ${sectionLabel(false)}${g.count === 1 ? '' : 's'}`;
      meta.appendChild(fnDiv);
      meta.appendChild(fcDiv);

      card.appendChild(meta);

      card.addEventListener('click', () => {
        state.activeFolder = g.key;
        state.search = '';
        document.getElementById('search').value = '';
        document.getElementById('searchClear').style.display = 'none';
        state.animes = [];
        update();
      });

      grid.appendChild(card);
    });
  }

  function updateResOptions() {
    document.querySelectorAll('#resFilters .filter-option').forEach(btn => {
      btn.classList.toggle('selected', state.res.includes(btn.dataset.val));
    });
  }

  function updateScreenOptions() {
    document.querySelectorAll('#screenFilters .filter-option').forEach(btn => {
      btn.classList.toggle('selected', state.screen.includes(btn.dataset.val));
    });
  }

  function updateAnimeOptions() {
    document.querySelectorAll('#animeList .filter-option').forEach(btn => {
      btn.classList.toggle('selected', state.animes.includes(btn.textContent));
    });
  }

  function updateSectionNav() {
    document.querySelectorAll('.section-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.section === state.section);
    });
    rebuildAnimeList();
  }

  function update() {
    updatePills();
    updateResOptions();
    updateScreenOptions();
    updateAnimeOptions();
    updateSectionNav();
    render();
    pushURL();
  }

  function stateToParams() {
    const p = new URLSearchParams();
    if (state.search) p.set('q', state.search);
    if (state.res.length) p.set('res', state.res.join(','));
    if (state.screen.length) p.set('screen', state.screen.join(','));
    if (state.animes.length) p.set('anime', state.animes.join(','));
    if (state.folderMode && state.activeFolder) p.set('folder', state.activeFolder);
    if (state.folderMode && !state.activeFolder) p.set('view', 'folders');
    if (state.section !== 'Wallpapers') p.set('section', state.section);
    const qs = p.toString();
    return qs ? '?' + qs : location.pathname;
  }

  function pushURL() {
    const url = stateToParams();
    if (location.search !== url.slice(url.indexOf('?'))) {
      history.pushState(null, '', url);
    }
  }

  function loadURL() {
    const p = new URLSearchParams(location.search);
    state.search = p.get('q') || '';
    state.res = (p.get('res') || '').split(',').filter(Boolean);
    state.screen = (p.get('screen') || '').split(',').filter(Boolean);
    state.animes = (p.get('anime') || '').split(',').filter(Boolean);
    state.section = p.get('section') || 'Wallpapers';
    const folder = p.get('folder');
    if (folder) {
      state.folderMode = true;
      state.activeFolder = folder;
    } else if (p.get('view') === 'folders') {
      state.folderMode = true;
      state.activeFolder = null;
    }
    if (state.search) {
      const search = document.getElementById('search');
      search.value = state.search;
      document.getElementById('searchClear').style.display = 'flex';
    }
  }

  window.addEventListener('popstate', () => {
    loadURL();
    update();
  });

  if (!location.search.includes('view=') && !location.search.includes('folder=')) {
    if (localStorage.getItem('walls:folderMode') === 'true') {
      state.folderMode = true;
    }
  }
  if (!location.search.includes('section=')) {
    const savedSection = localStorage.getItem('walls:section');
    if (savedSection) state.section = savedSection;
  }
  loadURL();
  update();
}

init();
</script>
</body>
</html>
