<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>highpapers</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #131313;
    --text: #ededed;
    --mute: #5c5c5c;
    --border: #1f1f1f;
    --active: #2a2a2a;
    --pill: #1c1c1c;
    --shadow: rgba(0,0,0,0.6);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    max-width: 1440px;
    margin: 0 auto;
    padding: 48px 32px 96px;
  }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  h1 {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .breadcrumb {
    font-size: 13px;
    color: var(--mute);
    display: none;
    align-items: center;
    gap: 6px;
  }

  .breadcrumb.show { display: flex; }

  .breadcrumb button {
    background: none;
    border: none;
    color: var(--mute);
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    padding: 2px 0;
  }

  .breadcrumb button:hover { color: var(--text); }

  .breadcrumb span { color: var(--text); }

  .search-row {
    margin-bottom: 16px;
  }

  .search {
    width: 100%;
    height: 38px;
    padding: 0 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s ease;
  }

  .search::placeholder { color: var(--mute); }
  .search:focus { border-color: #333; }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .pills {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 8px 4px 10px;
    background: var(--pill);
    border: 1px solid var(--border);
    border-radius: 5px;
    font-size: 11px;
    color: var(--text);
    cursor: default;
    animation: pillIn 0.15s ease;
  }

  .pill button {
    background: none;
    border: none;
    color: var(--mute);
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    padding: 0;
    display: flex;
  }

  .pill button:hover { color: var(--text); }

  @keyframes pillIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .icon-btn {
    width: 38px;
    height: 38px;
    border-radius: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, border-color 0.15s ease;
    position: relative;
    flex-shrink: 0;
  }

  .icon-btn svg {
    width: 16px;
    height: 16px;
    stroke: var(--text);
    fill: none;
    stroke-width: 1.5;
  }

  .icon-btn:hover { background: var(--active); border-color: #333; }

  .icon-btn.active {
    background: var(--active);
    border-color: #444;
  }

  .icon-btn.active svg { stroke: #fff; }

  .icon-btn .dot {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #fff;
    display: none;
  }

  .icon-btn.has-dot .dot { display: block; }

  .filter-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
    display: none;
    animation: panelIn 0.15s ease;
  }

  .filter-panel.open { display: block; }

  @keyframes panelIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
  }

  .filter-group {
    min-width: 140px;
  }

  .filter-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--mute);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  .filter-options {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .filter-option {
    padding: 4px 10px;
    border-radius: 4px;
    background: var(--pill);
    border: 1px solid var(--border);
    color: var(--mute);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.12s ease;
  }

  .filter-option:hover { color: var(--text); border-color: #333; }

  .filter-option.selected {
    background: var(--active);
    border-color: #444;
    color: var(--text);
  }

  .filter-toggle {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 4px 10px;
    border-radius: 4px;
    background: var(--pill);
    border: 1px solid var(--border);
    color: var(--mute);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.12s ease;
  }

  .filter-toggle.on { background: var(--active); border-color: #444; color: var(--text); }

  .filter-toggle .toggle-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.12s ease;
  }

  .filter-toggle.on .toggle-dot { background: #fff; }

  .anime-list {
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .count-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }

  .count {
    font-size: 13px;
    color: var(--mute);
    font-variant-numeric: tabular-nums;
  }

  .count .filtered { color: var(--text); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .card, .folder-card {
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    background: var(--surface);
    cursor: pointer;
    opacity: 0;
    transform: translateY(12px);
    animation: enter 0.5s ease forwards;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  .card:hover, .folder-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px var(--shadow);
  }

  .card img, .folder-card img {
    display: block;
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    transition: transform 0.4s ease;
  }

  .card:hover img, .folder-card:hover img { transform: scale(1.03); }

  .card .meta {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 24px 16px 12px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .card:hover .meta { opacity: 1; }

  .card .name, .folder-card .folder-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
  }

  .card .res, .folder-card .folder-count {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    font-variant-numeric: tabular-nums;
  }

  .folder-card .folder-meta {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 24px 16px 16px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .card .download {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .card .download svg {
    width: 14px;
    height: 14px;
    stroke: var(--text);
    fill: none;
    stroke-width: 1.5;
  }

  .card .download:hover { background: rgba(255,255,255,0.2); }

  @keyframes enter {
    to { opacity: 1; transform: translateY(0); }
  }

  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }

  .lightbox.open { opacity: 1; pointer-events: auto; }

  .lightbox img {
    max-width: 92vw;
    max-height: 90vh;
    border-radius: 4px;
    box-shadow: 0 4px 80px rgba(0,0,0,0.5);
    transform: scale(0.95);
    transition: transform 0.3s ease;
  }

  .lightbox.open img { transform: scale(1); }

  .lightbox .top-actions {
    position: absolute;
    top: 24px;
    right: 24px;
    display: flex;
    gap: 8px;
  }

  .lightbox .top-actions button, .lightbox .top-actions a {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
    text-decoration: none;
  }

  .lightbox .top-actions button:hover, .lightbox .top-actions a:hover {
    background: rgba(255,255,255,0.15);
  }

  .lightbox .top-actions svg {
    width: 16px;
    height: 16px;
    stroke: var(--text);
    fill: none;
    stroke-width: 1.5;
  }

  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 80px 0;
    color: var(--mute);
    font-size: 14px;
  }

  .empty svg {
    width: 40px;
    height: 40px;
    stroke: var(--mute);
    fill: none;
    stroke-width: 1.2;
    opacity: 0.5;
  }

  @media (max-width: 768px) {
    body { padding: 32px 16px 64px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .filter-row { flex-direction: column; gap: 16px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .card, .folder-card { animation: none; opacity: 1; transform: none; }
    .lightbox img { transition: none; }
  }
</style>
</head>
<body>

<header>
  <h1>highpapers</h1>
  <div class="breadcrumb" id="breadcrumb">
    <button id="breadcrumbBack">all</button>
    <span>/</span>
    <span id="breadcrumbCurrent"></span>
  </div>
</header>

<div class="search-row">
  <input type="text" class="search" id="search" placeholder="search...">
</div>

<div class="toolbar">
  <button class="icon-btn" id="folderBtn" aria-label="Folder view">
    <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
  </button>
  <button class="icon-btn" id="filterBtn" aria-label="Filters">
    <svg viewBox="0 0 24 24"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>
    <span class="dot"></span>
  </button>
  <div class="pills" id="pills"></div>
</div>

<div class="filter-panel" id="filterPanel">
  <div class="filter-row">
    <div class="filter-group">
      <div class="filter-label">Resolution</div>
      <div class="filter-options" id="resFilters">
        <button class="filter-option" data-val="4k">4K</button>
        <button class="filter-option" data-val="1080p">1080p</button>
        <button class="filter-option" data-val="custom">other</button>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-label">Screen</div>
      <div class="filter-options" id="screenFilters">
        <button class="filter-option" data-val="3840x2160">3840x2160</button>
        <button class="filter-option" data-val="1080x1920">1080x1920</button>
        <button class="filter-option" data-val="custom">other</button>
      </div>
    </div>
    <div class="filter-group">
      <div class="filter-label">Anime</div>
      <button class="filter-toggle" id="animeToggle">
        <span class="toggle-dot"></span>
        all anime
      </button>
      <div class="anime-list" id="animeList"></div>
    </div>
  </div>
</div>

<div class="count-bar">
  <span class="count" id="count"></span>
</div>

<div class="grid" id="grid"></div>

<div class="empty" id="empty">
  <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
  <span>no wallpapers match</span>
</div>

<div class="lightbox" id="lightbox">
  <div class="top-actions">
    <a class="lb-dl" download href="">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </a>
    <button class="lb-close" aria-label="Close">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <img src="" alt="">
</div>

<script>
const state = {
  search: '',
  res: [],
  screen: [],
  animeEnabled: false,
  animes: [],
  allAnimes: [],
  folderMode: false,
  activeFolder: null,
};

let allWallpapers = [];

function resCat(w, h) {
  if (w >= 3840 && h >= 2160) return '4k';
  if (w >= 1920 && h >= 1080) return '1080p';
  return 'custom';
}

function screenCat(w, h) {
  const key = `${w}x${h}`;
  if (key === '3840x2160' || key === '1080x1920') return key;
  return 'custom';
}

function pill(label, group, val) {
  const p = document.createElement('span');
  p.className = 'pill';
  p.innerHTML = `${label} <button aria-label="Remove ${label}">&times;</button>`;
  p.querySelector('button').addEventListener('click', () => {
    if (group === 'res') state.res = state.res.filter(v => v !== val);
    if (group === 'screen') state.screen = state.screen.filter(v => v !== val);
    if (group === 'anime') {
      state.animes = state.animes.filter(v => v !== val);
      if (state.animes.length === 0) state.animeEnabled = false;
    }
    update();
  });
  return p;
}

function updatePills() {
  const container = document.getElementById('pills');
  container.innerHTML = '';
  state.res.forEach(v => {
    const label = v === '4k' ? '4K' : v === '1080p' ? '1080p' : 'other res';
    container.appendChild(pill(label, 'res', v));
  });
  state.screen.forEach(v => {
    const label = v === 'custom' ? 'other screen' : v;
    container.appendChild(pill(label, 'screen', v));
  });
  state.animes.forEach(v => {
    container.appendChild(pill(v, 'anime', v));
  });
  const fb = document.getElementById('filterBtn');
  const has = state.res.length > 0 || state.screen.length > 0 || state.animes.length > 0;
  fb.classList.toggle('has-dot', has);
  if (state.animes.length > 0) fb.classList.add('active');

  document.getElementById('animeToggle').classList.toggle('on', state.animes.length > 0);
  document.getElementById('folderBtn').classList.toggle('active', state.folderMode);
}

function matches(wp) {
  const [w, h] = wp.resolution.split('x').map(Number);
  if (state.search) {
    const q = state.search.toLowerCase();
    if (!wp.name.toLowerCase().includes(q) && !(wp.anime || '').toLowerCase().includes(q)) return false;
  }
  if (state.res.length > 0 && !state.res.includes(resCat(w, h))) return false;
  if (state.screen.length > 0 && !state.screen.includes(screenCat(w, h))) return false;
  if (state.animes.length > 0 && !state.animes.includes(wp.anime)) return false;
  return true;
}

async function init() {
  const res = await fetch('wallpapers.json');
  allWallpapers = await res.json();

  state.allAnimes = [...new Set(allWallpapers.map(w => w.anime).filter(Boolean))].sort();

  const animeList = document.getElementById('animeList');
  state.allAnimes.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'filter-option';
    btn.textContent = a;
    btn.addEventListener('click', () => {
      if (state.animes.includes(a)) {
        state.animes = state.animes.filter(v => v !== a);
      } else {
        state.animes.push(a);
      }
      update();
    });
    animeList.appendChild(btn);
  });

  document.getElementById('animeToggle').addEventListener('click', () => {
    if (state.animes.length > 0) {
      state.animes = [];
    } else {
      state.animes = [...state.allAnimes];
    }
    update();
  });

  document.getElementById('resFilters').addEventListener('click', e => {
    if (!e.target.classList.contains('filter-option')) return;
    const v = e.target.dataset.val;
    if (state.res.includes(v)) state.res = state.res.filter(x => x !== v);
    else state.res.push(v);
    update();
  });

  document.getElementById('screenFilters').addEventListener('click', e => {
    if (!e.target.classList.contains('filter-option')) return;
    const v = e.target.dataset.val;
    if (state.screen.includes(v)) state.screen = state.screen.filter(x => x !== v);
    else state.screen.push(v);
    update();
  });

  const filterBtn = document.getElementById('filterBtn');
  const filterPanel = document.getElementById('filterPanel');
  filterBtn.addEventListener('click', () => filterPanel.classList.toggle('open'));

  document.getElementById('folderBtn').addEventListener('click', () => {
    state.folderMode = !state.folderMode;
    state.activeFolder = null;
    update();
  });

  document.getElementById('breadcrumbBack').addEventListener('click', () => {
    state.activeFolder = null;
    update();
  });

  const search = document.getElementById('search');
  let searchTimer;
  search.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      state.search = search.value;
      update();
    }, 150);
  });

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const countEl = document.getElementById('count');
  const lb = document.getElementById('lightbox');
  const lbImg = lb.querySelector('img');
  const lbDl = lb.querySelector('.lb-dl');
  const lbClose = lb.querySelector('.lb-close');

  const folderSvg = '<svg viewBox="0 0 24 24" style="position:absolute;top:12px;left:12px;width:20px;height:20px;stroke:rgba(255,255,255,0.6);fill:none;stroke-width:1.5;z-index:1"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
  const downloadSvg = '<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';

  function render() {
    grid.innerHTML = '';
    empty.style.display = 'none';

    const bc = document.getElementById('breadcrumb');
    const bcCur = document.getElementById('breadcrumbCurrent');

    if (state.folderMode && !state.activeFolder) {
      bc.classList.remove('show');
      bcCur.textContent = '';
      state.animes = [];
      state.animeEnabled = false;
      updateAnimeOptions();
      updatePills();

      const folders = state.allAnimes.map(anime => ({
        anime,
        preview: allWallpapers.find(w => w.anime === anime),
        count: allWallpapers.filter(w => w.anime === anime).length,
      }));

      if (state.search) {
        const q = state.search.toLowerCase();
        const filtered = folders.filter(f => f.anime.toLowerCase().includes(q));
        renderedFolders(filtered);
        countEl.innerHTML = `${filtered.length} folder${filtered.length === 1 ? '' : 's'}`;
      } else {
        renderedFolders(folders);
        countEl.innerHTML = `${folders.length} folder${folders.length === 1 ? '' : 's'}`;
      }
      return;
    }

    let pool = allWallpapers;
    if (state.folderMode && state.activeFolder) {
      pool = allWallpapers.filter(w => w.anime === state.activeFolder);
      bc.classList.add('show');
      bcCur.textContent = state.activeFolder;
    } else if (!state.folderMode) {
      bc.classList.remove('show');
      bcCur.textContent = '';
    }

    const filtered = pool.filter(matches);

    if (filtered.length === 0) {
      empty.style.display = 'flex';
    }

    const total = pool.length;
    const shown = filtered.length;
    if (total === shown) {
      countEl.innerHTML = `${total} wallpaper${total === 1 ? '' : 's'}`;
    } else {
      countEl.innerHTML = `<span class="filtered">${shown}</span> / ${total} wallpapers`;
    }

    filtered.forEach((wp, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${i * 0.03}s`;

      const img = document.createElement('img');
      img.src = wp.url;
      img.alt = wp.name || '';
      img.loading = 'lazy';

      const meta = document.createElement('div');
      meta.className = 'meta';

      const info = document.createElement('div');
      info.innerHTML = `<div class="name">${wp.name || 'untitled'}</div>${wp.resolution ? `<div class="res">${wp.resolution}</div>` : ''}`;

      const dl = document.createElement('button');
      dl.className = 'download';
      dl.innerHTML = downloadSvg;
      dl.title = 'Download';
      dl.addEventListener('click', e => {
        e.stopPropagation();
        const a = document.createElement('a');
        a.href = wp.url;
        a.download = wp.name || '';
        a.click();
      });

      meta.appendChild(info);
      meta.appendChild(dl);
      card.appendChild(img);
      card.appendChild(meta);

      card.addEventListener('click', () => {
        lbImg.src = wp.url;
        lbImg.alt = wp.name || '';
        lbDl.href = wp.url;
        lbDl.download = wp.name || '';
        lb.classList.add('open');
      });

      grid.appendChild(card);
    });
  }

  function renderedFolders(folders) {
    folders.forEach((f, i) => {
      const card = document.createElement('div');
      card.className = 'folder-card';
      card.style.animationDelay = `${i * 0.04}s`;

      const img = document.createElement('img');
      img.src = f.preview.url;
      img.alt = f.anime;
      img.loading = 'lazy';

      const meta = document.createElement('div');
      meta.className = 'folder-meta';
      meta.innerHTML = `<div class="folder-name">${f.anime}</div><div class="folder-count">${f.count} wallpaper${f.count === 1 ? '' : 's'}</div>`;

      card.innerHTML = folderSvg;
      card.appendChild(img);
      card.appendChild(meta);

      card.addEventListener('click', () => {
        state.activeFolder = f.anime;
        state.search = '';
        document.getElementById('search').value = '';
        state.res = [];
        state.screen = [];
        state.animes = [];
        state.animeEnabled = false;
        update();
      });

      grid.appendChild(card);
    });
  }

  function updateResOptions() {
    document.querySelectorAll('#resFilters .filter-option').forEach(btn => {
      btn.classList.toggle('selected', state.res.includes(btn.dataset.val));
    });
  }

  function updateScreenOptions() {
    document.querySelectorAll('#screenFilters .filter-option').forEach(btn => {
      btn.classList.toggle('selected', state.screen.includes(btn.dataset.val));
    });
  }

  function updateAnimeOptions() {
    document.querySelectorAll('#animeList .filter-option').forEach(btn => {
      btn.classList.toggle('selected', state.animes.includes(btn.textContent));
    });
  }

  function update() {
    updatePills();
    updateResOptions();
    updateScreenOptions();
    updateAnimeOptions();
    render();
  }

  update();

  lbClose.addEventListener('click', () => lb.classList.remove('open'));
  lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.classList.remove('open'); });
}

init();
</script>
</body>
</html>
