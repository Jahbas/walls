name: generate wallpapers.json

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: generate wallpapers.json
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, os

          token = os.environ['GITHUB_TOKEN']
          repo = os.environ['GITHUB_REPOSITORY']
          api_base = f'https://api.github.com/repos/{repo}'
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json'
          }

          with open('metadata.json') as f:
              metadata = json.load(f)

          releases_url = f'{api_base}/releases?per_page=100'
          req = urllib.request.Request(releases_url, headers=headers)
          with urllib.request.urlopen(req) as resp:
              releases = json.loads(resp.read())

          entries = []
          seen = set()
          for release in releases:
              tag = release['tag_name']
              assets_url = release['assets_url']
              page = 1
              while True:
                  req = urllib.request.Request(f'{assets_url}?per_page=100&page={page}', headers=headers)
                  with urllib.request.urlopen(req) as resp:
                      assets = json.loads(resp.read())
                  if not assets:
                      break
                  for a in assets:
                      filename = a['name']
                      if filename in seen:
                          continue
                      seen.add(filename)
                      if filename not in metadata:
                          print(f'WARNING: no metadata for {filename}, skipping')
                          continue
                      m = metadata[filename]
                      entry = {
                          'name': m['name'],
                          'url': a['browser_download_url'],
                          'resolution': m['resolution'],
                          'fileSize': a['size'],
                          'anime': m['anime']
                      }
                      if m.get('section') and m['section'] != 'Wallpapers':
                          entry['section'] = m['section']
                      if m.get('set'):
                          entry['set'] = m['set']
                      entries.append(entry)
                  page += 1

          entries.sort(key=lambda e: (e.get('set', '') or e['anime'], e['name']))
          with open('wallpapers.json', 'w') as f:
              json.dump(entries, f, indent=2, ensure_ascii=False)
          print(f'Generated {len(entries)} entries from {len(seen)} assets')
          PYEOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: commit wallpapers.json
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add wallpapers.json
          git diff --staged --quiet || git commit -m "auto: regenerate wallpapers.json (${{ github.event.release.tag_name || 'manual' }})"
          git push
